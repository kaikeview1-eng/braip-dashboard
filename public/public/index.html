<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Braip</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f4f0; --card:#fff; --border:#e4e2db;
  --text:#1a1a18; --muted:#7a7870; --muted2:#aaa89f;
  --c-transit:#1d4ed8; --c-transit-bg:#eff6ff;
  --c-wait:#b45309;    --c-wait-bg:#fffbeb;
  --c-done:#166534;    --c-done-bg:#f0fdf4;
  --c-problem:#9f1239; --c-problem-bg:#fff1f2;
  --c-posted:#4b5563;  --c-posted-bg:#f9fafb;
  --radius:12px; --mono:'IBM Plex Mono',monospace; --sans:'Cabinet Grotesk',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}
.shell{max-width:1280px;margin:0 auto;padding:28px 20px}
.hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:26px;font-weight:800;letter-spacing:-.04em}
.hdr p{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
.live-chip{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;color:var(--muted);font-family:var(--mono)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 5px rgba(34,197,94,.1)}}
.live-dot.off{background:#f59e0b;box-shadow:none;animation:none}
.search-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-box{flex:1;min-width:220px;display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:0 16px;transition:border-color .15s}
.search-box:focus-within{border-color:var(--text)}
.search-box input{background:none;border:none;outline:none;font-family:var(--mono);font-size:13px;color:var(--text);padding:10px 0;width:100%}
.search-box input::placeholder{color:var(--muted)}
.btn-ghost{background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:var(--radius);padding:0 16px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;height:42px}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:border-color .15s;position:relative;overflow:hidden}
.mc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--mc-color,transparent);opacity:0;transition:opacity .15s}
.mc:hover::after,.mc.on::after{opacity:1}
.mc:hover,.mc.on{border-color:var(--mc-color,var(--border))}
.mc-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.04em;margin-bottom:8px;text-transform:uppercase}
.mc-val{font-size:28px;font-weight:800;letter-spacing:-.04em;color:var(--mc-color,var(--text));font-family:var(--mono)}
.mc-sub{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
.chips{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.chip{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--sans)}
.chip:hover{color:var(--text);border-color:#aaa}
.chip.on{color:var(--chip-c);border-color:var(--chip-c);background:var(--chip-bg)}
.chip-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.sort-sel{margin-left:auto;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-family:var(--sans);font-size:12px;font-weight:500;padding:6px 14px;cursor:pointer;outline:none}
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tbl-head{display:grid;grid-template-columns:36px 160px 1fr 170px 110px 70px;padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;gap:10px;align-items:center}
.row{display:grid;grid-template-columns:36px 160px 1fr 170px 110px 70px;padding:13px 20px;border-bottom:1px solid var(--border);gap:10px;align-items:center;cursor:pointer;transition:background .1s;animation:fadeIn .25s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.row:last-child{border-bottom:none}
.row:hover{background:var(--bg)}
.row.sel{background:#fafaf7;border-left:3px solid var(--text);padding-left:17px}
.ri{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center}
.rcode{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px;cursor:pointer}
.rcode-val{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px;opacity:0;transition:opacity .1s;flex-shrink:0}
.rcode:hover .copy-btn{opacity:1}
.rclient .name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rclient .phone{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.p-postado{background:var(--c-posted-bg);color:var(--c-posted)}
.p-transito{background:var(--c-transit-bg);color:var(--c-transit)}
.p-retirada{background:var(--c-wait-bg);color:var(--c-wait)}
.p-entregue{background:var(--c-done-bg);color:var(--c-done)}
.p-problema{background:var(--c-problem-bg);color:var(--c-problem)}
.reta{font-family:var(--mono);font-size:12px;color:var(--muted)}
.reta.urg{color:var(--c-wait);font-weight:700}
.reta.ok{color:var(--c-done);font-weight:700}
.acts{display:flex;gap:5px;justify-content:flex-end}
.act{background:none;border:1px solid var(--border);border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:13px;transition:all .13s}
.act:hover{background:var(--bg);border-color:#aaa;color:var(--text)}
.detail{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;display:none}
.detail.open{display:block;animation:fadeIn .2s ease}
.det-top{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--border);background:var(--bg)}
.det-top-info{flex:1}
.det-top-info .dname{font-size:15px;font-weight:800}
.det-top-info .dcode{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
.det-close{background:none;border:1px solid var(--border);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:15px}
.det-close:hover{background:var(--border)}
.det-body{padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
.det-table{width:100%;border-collapse:collapse}
.det-table td{padding:7px 0;font-size:12px;border-bottom:1px solid var(--border);vertical-align:top}
.det-table td:first-child{color:var(--muted);width:120px;font-family:var(--mono);font-size:11px}
.det-table td:last-child{font-weight:600;text-align:right;font-family:var(--mono);font-size:11px}
.det-table tr:last-child td{border-bottom:none}
.det-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.det-btn{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .13s;color:var(--text)}
.det-btn:hover{border-color:var(--text)}
.empty{text-align:center;padding:56px 20px;color:var(--muted)}
.empty-ico{font-size:36px;margin-bottom:10px;opacity:.4}
.empty p{font-size:14px;font-weight:600}
.empty small{font-family:var(--mono);font-size:11px;margin-top:6px;display:block}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;border-radius:var(--radius);padding:12px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.15);animation:slideUp .25s ease;z-index:999}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){
  .metrics{grid-template-columns:repeat(3,1fr)}
  .tbl-head,.row{grid-template-columns:36px 140px 1fr 140px}
  .tbl-head span:nth-child(5),.tbl-head span:nth-child(6),
  .row>*:nth-child(5),.row>*:nth-child(6){display:none}
  .det-body{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="shell">

  <div class="hdr">
    <div>
      <h1>Pedidos Braip</h1>
      <p id="ts">Conectando ao servidor...</p>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div class="live-chip"><div class="live-dot" id="ldot"></div><span id="lstatus">Carregando...</span></div>
      <button class="btn-ghost" onclick="exportCSV()">↓ Exportar CSV</button>
    </div>
  </div>

  <div class="search-row">
    <div class="search-box">
      <span style="color:var(--muted)">⌕</span>
      <input id="q" type="text" placeholder="Buscar código, nome, telefone..." oninput="render()">
    </div>
  </div>

  <div class="metrics">
    <div class="mc" style="--mc-color:#4b5563" onclick="flt('all')" id="mc-all">
      <div class="mc-label">Total</div>
      <div class="mc-val" id="mv-all">0</div>
      <div class="mc-sub">pedidos</div>
    </div>
    <div class="mc" style="--mc-color:var(--c-transit)" onclick="flt('transito')" id="mc-transito">
      <div class="mc-label">Em trânsito</div>
      <div class="mc-val" id="mv-transito">0</div>
      <div class="mc-sub">a caminho</div>
    </div>
    <div class="mc" style="--mc-color:var(--c-wait)" onclick="flt('retirada')" id="mc-retirada">
      <div class="mc-label">Aguard. retirada</div>
      <div class="mc-val" id="mv-retirada">0</div>
      <div class="mc-sub">⚡ na agência</div>
    </div>
    <div class="mc" style="--mc-color:var(--c-done)" onclick="flt('entregue')" id="mc-entregue">
      <div class="mc-label">Entregues</div>
      <div class="mc-val" id="mv-entregue">0</div>
      <div class="mc-sub">concluídos</div>
    </div>
    <div class="mc" style="--mc-color:var(--c-problem)" onclick="flt('problema')" id="mc-problema">
      <div class="mc-label">Problemas</div>
      <div class="mc-val" id="mv-problema">0</div>
      <div class="mc-sub">⚠ atenção</div>
    </div>
  </div>

  <div class="chips">
    <div class="chip on" data-f="all" style="--chip-c:#4b5563;--chip-bg:#f9fafb" onclick="flt('all',this)">Todos</div>
    <div class="chip" data-f="postado" style="--chip-c:var(--c-posted);--chip-bg:var(--c-posted-bg)" onclick="flt('postado',this)"><span class="chip-dot"></span>Postado</div>
    <div class="chip" data-f="transito" style="--chip-c:var(--c-transit);--chip-bg:var(--c-transit-bg)" onclick="flt('transito',this)"><span class="chip-dot"></span>Em trânsito</div>
    <div class="chip" data-f="retirada" style="--chip-c:var(--c-wait);--chip-bg:var(--c-wait-bg)" onclick="flt('retirada',this)"><span class="chip-dot"></span>Aguardando retirada</div>
    <div class="chip" data-f="entregue" style="--chip-c:var(--c-done);--chip-bg:var(--c-done-bg)" onclick="flt('entregue',this)"><span class="chip-dot"></span>Entregue ao destinatário</div>
    <div class="chip" data-f="problema" style="--chip-c:var(--c-problem);--chip-bg:var(--c-problem-bg)" onclick="flt('problema',this)"><span class="chip-dot"></span>Problema</div>
    <select class="sort-sel" onchange="render()">
      <option value="newest">Mais recentes</option>
      <option value="oldest">Mais antigos</option>
      <option value="status">Por status</option>
      <option value="name">Por nome A-Z</option>
    </select>
  </div>

  <div class="detail" id="detail"></div>

  <div class="tbl-wrap">
    <div class="tbl-head">
      <span>#</span><span>Código rastreio</span><span>Cliente</span>
      <span>Status</span><span>Previsão</span><span></span>
    </div>
    <div id="list"></div>
  </div>

</div>
<script>
const S = {
  postado:  {label:'Postado',             cls:'p-postado'},
  transito: {label:'Em trânsito',         cls:'p-transito'},
  retirada: {label:'Aguardando retirada', cls:'p-retirada'},
  entregue: {label:'Entregue ao destinatário',cls:'p-entregue'},
  problema: {label:'Problema na entrega', cls:'p-problema'},
}

let orders=[], filter='all', selId=null

// busca dados do servidor a cada 10 segundos
async function fetchOrders() {
  try {
    const r = await fetch('/api/orders')
    if (!r.ok) throw new Error('erro')
    const data = await r.json()
    orders = data
    setOnline(true)
    render()
  } catch(e) {
    setOnline(false)
  }
}

function setOnline(on) {
  const dot = document.getElementById('ldot')
  const lbl = document.getElementById('lstatus')
  const ts  = document.getElementById('ts')
  dot.className = 'live-dot' + (on?'':' off')
  lbl.textContent = on ? 'Ao vivo' : 'Sem conexão'
  if(on) ts.textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
}

function render() {
  const q   = document.getElementById('q').value.toLowerCase().trim()
  const srt = document.querySelector('.sort-sel').value

  const cnt = {all:orders.length,postado:0,transito:0,retirada:0,entregue:0,problema:0}
  orders.forEach(o => cnt[o.status]=(cnt[o.status]||0)+1)
  document.getElementById('mv-all').textContent      = cnt.all
  document.getElementById('mv-transito').textContent = cnt.transito
  document.getElementById('mv-retirada').textContent = cnt.retirada
  document.getElementById('mv-entregue').textContent = cnt.entregue
  document.getElementById('mv-problema').textContent = cnt.problema

  ;['all','transito','retirada','entregue','problema'].forEach(k=>{
    document.getElementById('mc-'+k).classList.toggle('on', filter===k)
  })

  let list = orders.filter(o=>{
    if(filter!=='all' && o.status!==filter) return false
    if(q && ![o.code,o.name,o.phone,o.city,o.id].join(' ').toLowerCase().includes(q)) return false
    return true
  })

  if(srt==='oldest')      list.sort((a,b)=>a.receivedAt-b.receivedAt)
  else if(srt==='status') list.sort((a,b)=>a.status.localeCompare(b.status))
  else if(srt==='name')   list.sort((a,b)=>a.name.localeCompare(b.name))
  else                    list.sort((a,b)=>b.receivedAt-a.receivedAt)

  const el = document.getElementById('list')
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">📦</div><p>${q?'Nenhum resultado':'Nenhum pedido ainda'}</p><small>${q?'Tente outro termo':'Aguardando dados da Braip via webhook'}</small></div>`
    return
  }

  el.innerHTML = list.map((o,i)=>{
    const sm = S[o.status]||S.postado
    const etaCls = o.status==='retirada'?'urg':o.status==='entregue'?'ok':''
    const codeShort = o.code?(o.code.length>15?o.code.slice(0,13)+'…':o.code):'—'
    return `<div class="row${o.id===selId?' sel':''}" onclick="sel('${o.id}')" style="animation-delay:${i*15}ms">
      <span class="ri">${i+1}</span>
      <span class="rcode" onclick="event.stopPropagation();cp('${o.code||''}')">
        <span class="rcode-val" title="${o.code||''}">${codeShort}</span>
        <button class="copy-btn" title="Copiar">⎘</button>
      </span>
      <span class="rclient">
        <div class="name">${o.name}</div>
        <div class="phone">${fmtPhone(o.phone)}${o.city?' · '+o.city:''}</div>
      </span>
      <span><span class="pill ${sm.cls}"><span class="dot"></span>${sm.label}</span></span>
      <span class="reta ${etaCls}">${o.eta||'—'}</span>
      <span class="acts">
        <button class="act" title="Rastrear" onclick="event.stopPropagation();correios('${o.code||''}')">🔍</button>
      </span>
    </div>`
  }).join('')
}

function sel(id){
  if(selId===id){selId=null;closeDetail();render();return}
  selId=id
  const o=orders.find(x=>x.id===id)
  if(!o)return
  const sm=S[o.status]||S.postado
  document.getElementById('detail').innerHTML=`
    <div class="det-top">
      <div class="det-top-info">
        <div class="dname">${o.name}${o.city?` <span style="font-weight:400;color:var(--muted)">· ${o.city}</span>`:''}` +`</div>
        <div class="dcode">${o.code||'Sem código de rastreio'}</div>
      </div>
      <span class="pill ${sm.cls}" style="font-size:11px"><span class="dot"></span>${sm.label}</span>
      <button class="det-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="det-body">
      <div>
        <table class="det-table">
          <tr><td>Código rastreio</td><td>${o.code||'—'}</td></tr>
          <tr><td>Transação</td><td>${o.id||'—'}</td></tr>
          <tr><td>Transportadora</td><td>${o.carrier||'—'}</td></tr>
          <tr><td>WhatsApp</td><td>${fmtPhone(o.phone)}</td></tr>
          <tr><td>Previsão entrega</td><td>${o.eta||'—'}</td></tr>
          <tr><td>Status original</td><td>${o.rawStatus||'—'}</td></tr>
          <tr><td>Recebido em</td><td>${new Date(o.receivedAt).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td></tr>
        </table>
        <div class="det-actions">
          <button class="det-btn" onclick="cp('${o.code||''}')">⎘ Copiar código</button>
          <button class="det-btn" onclick="correios('${o.code||''}')">🔍 Rastrear</button>
          ${o.phone?`<button class="det-btn" onclick="wpp('${o.phone}','${o.code||''}')">💬 WhatsApp</button>`:''}
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;text-align:center;padding:20px">
        <div>
          <div style="font-size:32px;margin-bottom:10px">${sm.cls==='p-retirada'?'⏳':sm.cls==='p-entregue'?'✅':sm.cls==='p-problema'?'⚠️':sm.cls==='p-transito'?'🚚':'📮'}</div>
          <div style="font-weight:700;color:var(--text)">${sm.label}</div>
          <div style="margin-top:6px;font-size:12px">Previsão: <strong>${o.eta||'—'}</strong></div>
        </div>
      </div>
    </div>`
  document.getElementById('detail').classList.add('open')
  render()
  document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'nearest'})
}
function closeDetail(){selId=null;document.getElementById('detail').classList.remove('open')}

function flt(f,el){
  filter=f
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'))
  if(el)el.classList.add('on')
  else{const c=document.querySelector(`.chip[data-f="${f}"]`);if(c)c.classList.add('on')}
  closeDetail();render()
}

function cp(code){
  if(!code)return
  navigator.clipboard&&navigator.clipboard.writeText(code)
  toast('✓ Código copiado: '+code)
}
function correios(code){
  if(!code){toast('⚠ Sem código');return}
  window.open('https://rastreamento.correios.com.br/app/index.php?objetos='+code,'_blank')
}
function wpp(phone,code){
  const msg=encodeURIComponent(`Seu código de rastreio: ${code}\nRastreie em: correios.com.br`)
  window.open(`https://wa.me/${phone.replace(/\D/g,'')}?text=${msg}`,'_blank')
}
function exportCSV(){
  if(!orders.length){toast('⚠ Nenhum pedido');return}
  const h=['Código','Nome','WhatsApp','Cidade','Status','Transportadora','Previsão','Transação','Recebido em']
  const rows=orders.map(o=>[o.code,o.name,o.phone,o.city,S[o.status]?.label,o.carrier,o.eta,o.id,new Date(o.receivedAt).toLocaleString('pt-BR')].map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(','))
  const blob=new Blob(['\uFEFF'+[h.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8'})
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='braip_pedidos_'+new Date().toISOString().slice(0,10)+'.csv';a.click()
  toast('📥 CSV exportado')
}
function fmtPhone(p){
  if(!p)return'—'
  const d=p.replace(/\D/g,'')
  if(d.length===13)return`+${d.slice(0,2)} (${d.slice(2,4)}) ${d.slice(4,9)}-${d.slice(9)}`
  if(d.length===11)return`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`
  return p
}
let tTimer
function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove())
  const t=document.createElement('div');t.className='toast';t.textContent=msg
  document.body.appendChild(t)
  clearTimeout(tTimer)
  tTimer=setTimeout(()=>t.remove(),3000)
}

// inicia
fetchOrders()
setInterval(fetchOrders, 10000) // atualiza a cada 10 segundos
</script>
